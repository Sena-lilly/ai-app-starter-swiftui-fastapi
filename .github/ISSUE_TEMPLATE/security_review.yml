name: Security Review
description: Request review of a security-sensitive area without posting secrets publicly.
title: "[Security Review]: "
labels: ["security"]
body:
  - type: markdown
    attributes:
      value: |
        Do not post secrets, tokens, private keys, passwords, production URLs, or exploitable private details in a public issue. For sensitive reports, follow SECURITY.md.
  - type: textarea
    id: area
    attributes:
      label: Area To Review
      description: Describe the area without exposing secrets.
    validations:
      required: true
  - type: textarea
    id: concern
    attributes:
      label: Concern
      description: What risk should be reviewed?
    validations:
      required: true
  - type: dropdown
    id: sensitivity
    attributes:
      label: Sensitivity
      options:
        - Public discussion is safe
        - Might be sensitive; maintainer should decide next steps
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety Checklist
      options:
        - label: I did not include secrets, real credentials, private keys, or tokens.
          required: true
        - label: I did not include production database details or real user data.
          required: true
        - label: I reviewed SECURITY.md before posting.
          required: true

