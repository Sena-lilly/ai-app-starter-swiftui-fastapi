name: Documentation Update
description: Report stale, unclear, or missing documentation.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: input
    id: page
    attributes:
      label: Page or File
      placeholder: "README.md, docs/quickstart.md, ..."
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What Should Change?
    validations:
      required: true
  - type: textarea
    id: suggested
    attributes:
      label: Suggested Wording
      description: Optional. Do not include secrets, personal data, or production URLs.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety Checklist
      options:
        - label: I did not include secrets, real credentials, or private information.
          required: true
        - label: This docs change does not imply production-ready status unless explicitly reviewed.
          required: true

