name: Bug Report
description: Report a reproducible local-development bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include secrets, real credentials, production URLs, or real user data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Local Reproduction Steps
      description: Use local-only steps and fake credentials.
      placeholder: |
        1. Run ...
        2. Open ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: backend
    attributes:
      label: Backend Environment
      placeholder: "Python version, FastAPI local run, Docker optional"
  - type: input
    id: ios
    attributes:
      label: iOS Environment
      placeholder: "Xcode version, simulator/device, iOS version"
  - type: checkboxes
    id: safety
    attributes:
      label: Safety Checklist
      options:
        - label: I did not include secrets, real credentials, private keys, or tokens.
          required: true
        - label: I did not use production or external databases.
          required: true
        - label: I used fake local data only.
          required: true

