name: iOS Build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-build:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build simulator app without signing
        # Build-only verification. This does not sign, upload, deploy,
        # or contact App Store/TestFlight services.
        run: |
          /Applications/Xcode.app/Contents/Developer/usr/bin/xcodebuild \
            -project ios/AiAppStarter.xcodeproj \
            -scheme AiAppStarter \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ios/.DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build
